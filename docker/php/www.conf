[www]
; Master and worker processes both run as the non-root "wejha" user set in the
; Dockerfile (USER wejha) — no privilege drop needed since there's no root to drop
; from, which is why this differs from the stock php-fpm image's www-data pool.
user = wejha
group = wejha

; Bound to localhost only: nginx runs in the same container (via supervisord) and is
; the only client — no need to expose the FPM port to the compose network.
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

clear_env = no

; Send worker error output to the container's stderr instead of a log file so it
; shows up in `docker compose logs`.
catch_workers_output = yes
decorate_workers_output = no
php_admin_flag[log_errors] = on
